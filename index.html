<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPA Auditor</title>
  <meta name="description" content="Browser-based scientific instrument auditing MPA framework predictions against empirical substrate data" />
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/shell.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">MPA <span class="accent">Auditor</span></h1>
    <div class="header-controls">
      <div class="settings">
        <button id="settings-toggle" class="btn settings-trigger" type="button"
                aria-haspopup="true" aria-expanded="false" aria-controls="settings-menu">
          Settings
        </button>
        <div id="settings-menu" class="settings-menu" role="menu" hidden>
          <div class="settings-row">
            <span class="settings-label">Mode</span>
            <div class="segmented" role="radiogroup" aria-label="Mode">
              <button class="segment is-active" data-mode-value="continuous"
                      role="radio" aria-checked="true" type="button">Continuous</button>
              <button class="segment" data-mode-value="discrete"
                      role="radio" aria-checked="false" type="button">Discrete</button>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Theme</span>
            <div class="segmented" role="radiogroup" aria-label="Theme">
              <button class="segment is-active" data-theme-value="dark"
                      role="radio" aria-checked="true" type="button">Dark</button>
              <button class="segment" data-theme-value="light"
                      role="radio" aria-checked="false" type="button">Light</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <nav class="tab-bar" role="tablist" aria-label="Auditor views">
    <button class="tab is-active" data-tab="gfdr" role="tab" type="button">gFDR Signatures</button>
    <button class="tab" data-tab="phase_portrait" role="tab" type="button">Phase Portrait</button>
    <button class="tab" data-tab="operator" role="tab" type="button">Operator Graph</button>
    <button class="tab" data-tab="substrate" role="tab" type="button">Substrate Map</button>
    <button class="tab" data-tab="library" role="tab" type="button">Audit Library</button>
  </nav>

  <main class="windows">

    <section class="window" data-window="predicted" aria-labelledby="window-1-title">
      <header class="window-header">
        <h2 class="window-title" id="window-1-title">Predicted</h2>
        <span class="window-label">Framework</span>
      </header>
      <div class="window-body window-body--prediction">
        <div class="prediction-meta">
          <span id="regime-badge" class="regime-badge">—</span>
          <span id="prediction-equation" class="equation"></span>
        </div>
        <div id="prediction-plot" class="prediction-plot" aria-label="gFDR signature plot"></div>
      </div>
    </section>

    <section class="window" data-window="empirical" aria-labelledby="window-2-title">
      <header class="window-header">
        <h2 class="window-title" id="window-2-title">Empirical</h2>
        <span class="window-label">Data</span>
      </header>
      <div class="window-body">
        <div class="attribution">[provenance panel — populated by Data Engine in Session 5]</div>
        <div id="upload-zone" class="upload-zone" aria-label="Upload zone">
          Drop CSV here<br/>
          <small>not yet wired</small>
        </div>
      </div>
    </section>

    <section class="window" data-window="delta" aria-labelledby="window-3-title">
      <header class="window-header">
        <h2 class="window-title" id="window-3-title">Audit</h2>
        <span class="window-label">Delta</span>
      </header>
      <div class="window-body">
        <p class="placeholder">Prediction-vs-data delta renders here.<br/>Miss category, extension recommendation, citation.</p>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <div class="slider-group">
      <label class="slider-label" for="chit-slider">regime parameter (chit)</label>
      <input id="chit-slider" class="chit-slider" type="range" min="-2" max="2" step="0.01" value="0" aria-label="Chit parameter slider" />
      <span class="slider-readout" id="chit-readout">0.00</span>
    </div>
  </footer>

  <!--
    Load order:
      1. Conductor (bus + registry)
      2. Style Manager (loads theme.json, applies CSS variables, awaits)
      3. Layout Manager (wires UI events)
      4. Engine + renderer stubs (each registers itself)
  -->
  <script type="module">
    import { init as initBus } from './core/conductor.js';
    import { init as initStyle } from './core/style-manager.js';
    import { init as initLayout, fireInitialState } from './core/layout-manager.js';

    import { init as initDiscrete } from './engines/discrete-engine.js';
    import { init as initCharacter } from './engines/character-engine.js';
    import { init as initData } from './engines/data-engine.js';
    import { init as initAudit } from './engines/audit-engine.js';

    import { init as initPlotly } from './renderers/plotly-2d.js';
    import { init as initThree } from './renderers/threejs-3d.js';
    import { init as initCyto } from './renderers/cytoscape-graph.js';
    import { init as initSubstrateMap } from './renderers/observable-substrate-map.js';

    (async () => {
      initBus();
      await initStyle();

      // Engines and renderers subscribe first so they catch the
      // initial STATE_REQUEST that layout-manager publishes below.
      initDiscrete();
      initCharacter();
      initData();
      initAudit();

      initPlotly();
      initThree();
      initCyto();
      initSubstrateMap();

      // Layout wires UI events and fires the first STATE_REQUEST so
      // Window 1 paints before the user touches anything.
      initLayout();
      fireInitialState();

      console.log(`[shell] ready — ${Object.keys(window.bus.registry).length} modules registered`);
    })();
  </script>

</body>
</html>
